<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>INSPECTOR // CHAITANYA KHURANA</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap"
    rel="stylesheet">
	<link rel="apple-touch-icon" sizes="180x180" href="assets/favicon_io (2)/apple-touch-icon.png">
	<link rel="icon" type="image/png" sizes="32x32" href="assets/favicon_io (2)//favicon-32x32.png">
	<link rel="icon" type="image/png" sizes="16x16" href="assets/favicon_io (2)//favicon-16x16.png">
	<link rel="manifest" href="assets/favicon_io (2)//site.webmanifest">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      background: #0000FF;
      color: #CCFF00;
      font-family: 'Space Mono', monospace;
      padding: 2vw;
      margin: 0;
      overflow-x: hidden;
    }

    ::selection {
      background: #FF00FF;
      color: #000;
    }


    /* --- THEMED SCROLLBAR --- */
    ::-webkit-scrollbar {
      width: 10px;
    }

    ::-webkit-scrollbar-track {
      background: #000;
    }

    ::-webkit-scrollbar-thumb {
      background: #FF00FF;
      border: 2px solid #CCFF00;
      border-radius: 0;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #CCFF00;
      border-color: #FF00FF;
    }

    html {
      scrollbar-color: #FF00FF #000;
      scrollbar-width: thin;
    }

    .nav {
      margin-bottom: 2rem;
    }

    .back-btn {
      color: #FF00FF;
      text-decoration: none;
      border: 2px solid #FF00FF;
      padding: 10px 20px;
      font-weight: bold;
      background: #000;
      transition: all 0.1s steps(2);
      display: inline-block;
    }

    .back-btn:hover {
      background: #FF00FF;
      color: #000;
      transform: translate(-3px, -3px);
      box-shadow: 5px 5px 0px #CCFF00;
    }

    .inspector-grid {
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 30px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .monitor {
      background: #000;
      border: 4px solid #CCFF00;
      box-shadow: 15px 15px 0px #FF00FF;
      overflow: hidden;
    }


    /* Container for the YouTube iframe */
    .video-wrap {
      width: 100%;
      aspect-ratio: 16/9;
      background: #000;
      position: relative;
    }

    #player {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }

    .metadata {
      background: #000;
      border: 4px solid #FF00FF;
      padding: 25px;
      box-shadow: 15px 15px 0px #CCFF00;
    }

    .label {
      color: #FF00FF;
      font-weight: bold;
      display: block;
      margin-top: 20px;
    }

    .stats-box {
      background: #111;
      padding: 10px;
      margin-top: 5px;
      font-size: 0.8rem;
      border-left: 2px solid #FF00FF;
    }

    .signal-bar {
      padding: 10px;
      font-size: 0.7rem;
      display: flex;
      justify-content: space-between;
    }

    /* =========================================
     MOBILE OPTIMIZATION
     ========================================= */
    @media (max-width: 900px) {
      .inspector-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 768px) {
      body {
        padding: 3vw;
      }

      .inspector-grid {
        gap: 15px;
      }

      .monitor {
        box-shadow: 8px 8px 0px #FF00FF;
        border-width: 3px;
      }

      .metadata {
        box-shadow: 8px 8px 0px #CCFF00;
        border-width: 3px;
        padding: 15px;
      }

      .metadata h1 {
        font-size: 1.3rem;
        word-break: break-word;
      }

      .label {
        font-size: 0.85rem;
        margin-top: 15px;
      }

      .stats-box {
        font-size: 0.75rem;
      }

      .signal-bar {
        font-size: 0.6rem;
      }

      .back-btn {
        padding: 8px 14px;
        font-size: 0.85rem;
      }

      #neon-cursor,
      #neon-cursor-trail {
        display: none;
      }

      /* Hide cursor on touch */
    }
  </style>
</head>

<body>

  <div class="nav"><a href="index.html" class="back-btn">&lt;&lt; CLOSE_INSPECTOR</a></div>

  <div class="inspector-grid">
    <div class="monitor">
      <div class="video-wrap">
        <iframe id="player" src="" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
      </div>
      <div class="signal-bar">
        <span>EFFORT: MAX</span><span id="videoName">FILE_NAME.MP4</span>
      </div>
    </div>
    <div class="metadata">
      <h1 id="projTitle">TITLE</h1>
      <span class="label">> EDITORIAL_LOG:</span>
      <p id="projDesc"></p>
      <span class="label">> TAG:</span>
      <div class="stats-box" id="projStats"></div>
      <span class="label">> ROLE:</span>
      <p id="projRole"></p>
    </div>
  </div>

  <script>
    const projects = {
      "1": { title: "HAPPY RETIREMENT!", file: "HAPPY_RETIREMENT.MP4", ytID: "kn_zq6_dQhc", desc: "Happy retired life dad! A heartfelt personal tribute.", role: "Director & Editor", stats: "PERSONAL DOCUMENTARY" },
      "2": { title: "HOW TO LEARN BENGALI IN 4 EASY STEPS!", file: "LEARN_BENGALI.MP4", ytID: "AG1T8P8fnnY", desc: "Short Narrative Project made in 2nd Semester, SRFTI.", role: "Director, Editor & Sound Designer", stats: "SRFTI // SHORT FILM" },
      "3": { title: "HYBRID BHARATANATYAM | UNAKKUM ENAKKUM", file: "HYBRID_BHARATANATYAM.MP4", ytID: "HI33ChBN3nc", desc: "A fusion dance piece blending classical Bharatanatyam with contemporary movement.", role: "Director & Editor", stats: "PERSONAL DANCE FILM" },
      "4": { title: "DON'T STOP — FOSTER THE PEOPLE", file: "DONT_STOP_MV.MP4", ytID: "HVC84RFDDyc", desc: "A dynamic edit set to Foster the People's energetic track.", role: "Director & Editor", stats: "SRFTI // MONTAGE EXERCISE" },
      "5": { title: "PARALLEL ACTION EXERCISE", file: "PARALLEL_ACTION.MP4", ytID: "0mwCIBHDu4w", desc: "An editing exercise exploring parallel action and cross-cutting techniques.", role: "Editor", stats: "SRFTI // PARALLEL ACTION EXERCISE" },
      "6": { title: "TIME EXPANSION EXERCISE", file: "TIME_EXPANSION.MP4", ytID: "irGvtLs7R1g", desc: "An editing exercise focused on expanding time through cuts and pacing.", role: "Editor", stats: "SRFTI // TIME EXPANSION EXERCISE" }
    };

    const params = new URLSearchParams(window.location.search);
    const p = projects[params.get('id')];

    if (p) {
      document.getElementById('projTitle').innerText = p.title;
      document.getElementById('videoName').innerText = p.file;
      document.getElementById('projDesc').innerText = p.desc;
      document.getElementById('projRole').innerText = p.role;
      document.getElementById('projStats').innerHTML = p.stats;

      // Direct iframe embed — works from file:// protocol unlike the YT JS API
      document.getElementById('player').src =
        'https://www.youtube.com/embed/' + p.ytID + '?autoplay=0&mute=0&modestbranding=1&rel=0&controls=1';
    }

  </script>
</body>

</html>
